[flake8]
# define o limite de caracteres por linha
max-line-length = 88

# pastas e arquivos que o linter deve ignorar
exclude = 
    .git,
    __pycache__,
    venv,
    .venv,
    build,
    dist

# ignora erros específicos se necessário (opcional)
# E203: whitespace before ':' (conflito comum com o formatador Black)
# W503: line break before binary operator
extend-ignore = E203, W503